name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION : "us-east-1"
  REGION : "us-east-1"
  AMZN_BRAKET_OUT_S3_BUCKET : ${{ secrets.BUCKET_NAME }}
  REPOSITORY_NAME : ${{ secrets.REPOSITORY_NAME }}
  ACCOUNT_ID : ${{ secrets.ACCOUNT_ID }}
  BUILD_RESULTS_PATH : "build_results.txt"

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  build:
    strategy:
      matrix:
        container-type: ["base", "cudaq", "pytorch", "tensorflow"]
    runs-on: ubuntu-latest
    env:
      PREBUILD_TAG : ${{ matrix.container-type }}_prebuild_tag
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - uses: ./.github/actions/build-container
      with:
        container-type: ${{ matrix.container-type }}
        python-version: "3.12"
